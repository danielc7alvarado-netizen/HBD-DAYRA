<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Feliz Cumpleaños 🎂</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      color: white;
      padding: 50px;
    }
    h1 {
      font-size: 3em;
    }
    button {
      padding: 10px 20px;
      font-size: 18px;
      background: white;
      color: #ff4e50;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>🎉 ¡Feliz Cumpleaños! 🎉</h1>
  <p>Espero que tengas un día increíble 💖</p>

  <button onclick="mostrarMensaje()">Haz clic aquí 🎁</button>

  <p id="mensaje"></p>

  <script>
    function mostrarMensaje() {
      document.getElementById("mensaje").innerHTML = "Eres una persona muy especial 💫";
    }
  </script>

</body>
</html>

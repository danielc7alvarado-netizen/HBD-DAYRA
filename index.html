<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Feliz Cumpleaños Dayra 💖</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  color: white;
  overflow: hidden;
}

h1 {
  margin-top: 80px;
  font-size: 3em;
}

p {
  font-size: 1.3em;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  border: none;
  border-radius: 20px;
  background: white;
  color: #ff4e50;
  cursor: pointer;
  margin-top: 20px;
}

/* corazones animados */
.heart {
  position: fixed;
  bottom: -10px;
  font-size: 20px;
  animation: subir 5s linear infinite;
}

@keyframes subir {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}
</style>

</head>

<body>

<h1>🎉 Feliz Cumpleaños Dayra 🎉</h1>
<p>Hoy es un día especial porque tú existes 💖</p>

<button onclick="mostrar()">Haz clic aquí 🎁</button>

<p id="mensaje"></p>

<!-- música -->
<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<script>
function mostrar() {
  document.getElementById("mensaje").innerHTML =
    "Gracias por ser alguien tan especial 💫<br>Te deseo toda la felicidad del mundo 💕";
}

// corazones
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 5000);
}, 300);
</script>

</body>
</html>

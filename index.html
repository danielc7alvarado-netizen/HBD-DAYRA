<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- TIPOGRAFÍA BONITA -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<title>Feliz Cumpleaños Dayra 💖</title>

<style>
  .elemento {
  position: fixed;
  bottom: -50px;
  animation: flotar linear infinite;
  pointer-events: none;
}

@keyframes flotar {
  0% {
    transform: translateY(0) rotate(0deg);
    opacity: 0;
  }
  20% {
    opacity: 1;
  }
  100% {
    transform: translateY(-110vh) rotate(360deg);
    opacity: 0;
  }
}
 <script>
const elementos = [
  "💖","💗","💞",
  "🎂","🎉","🎈",
  "📐","✏️","✎",
  "<img src='casco.png' width='25'>"
];

setInterval(() => {
  let el = document.createElement("div");
  el.className = "elemento";

  el.innerHTML = elementos[Math.floor(Math.random()*elementos.length)];

  el.style.left = Math.random()*100 + "vw";
  el.style.fontSize = (Math.random()*20 + 15) + "px";
  el.style.animationDuration = (Math.random()*4 + 5) + "s";
  el.style.opacity = Math.random();

  document.body.appendChild(el);

  setTimeout(() => el.remove(), 8000);
}, 500);
</script>

body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#f5efe6;
  text-align:center;
}

/* fondo tipo arquitectura */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:url('https://images.unsplash.com/photo-1503387762-592deb58ef4e') no-repeat center/cover;
  opacity:0.15;
  z-index:-1;
}

/* título elegante */
h1{
  font-family:'Playfair Display', serif;
  font-size:3em;
  margin-top:60px;
  color:#6d4c41;
}

/* subtítulo */
p{
  color:#5d4037;
}

/* botón */
button{
  background:#d48c8c;
  color:white;
  border:none;
  padding:12px 25px;
  border-radius:20px;
  font-size:18px;
  cursor:pointer;
}

/* galería */
.galeria{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:30px;
}

/* fotos estilo tarjeta */
.galeria img{
  width:220px;
  margin:10px;
  border-radius:15px;
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
  transition:transform 0.3s;
}

/* efecto hover */
.galeria img:hover{
  transform:scale(1.1);
}

/* mensaje */
#mensaje{
  margin-top:20px;
  font-size:18px;
}

</style>
</head>

<body>

<h1>🎉 Feliz Cumpleaños Dayra 🎉</h1>

<p>Hoy celebramos a alguien que diseña sueños y construye inspiración 💖</p>

<button onclick="mostrar()">Haz clic aquí 🎁</button>

<p id="mensaje"></p>

<!-- GALERÍA DE FOTOS -->
<div class="galeria">
  <img src="foto1.jpeg">
  <img src="foto2.jpeg">
  <img src="foto3.jpeg">
</div>

<script>
function mostrar(){
  document.getElementById("mensaje").innerHTML =
  "Eres increíble, gracias por inspirar tanto 💫💖";
}
</script>

</body>
</html>
